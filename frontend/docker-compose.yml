services:
  vue-development:
    build:
      context: .
      target: development
    image: my-front-development:latest
    container_name: my-front-development-container
    volumes:
      - ./:/app
    command: sh /app/start.sh
    ports:
      - 5173:5173
    tty: true
    stdin_open: true
    environment:
      VITE_HMR_PORT: 5173
      VITE_API_URL: http://localhost:8000/api

      VITE_REVERB_APP_KEY: "fr6ej145c0m9njsh6npy"
      VITE_REVERB_HOST: "localhost"
      VITE_REVERB_PORT: 8090
      VITE_REVERB_SCHEME: "http"
      VITE_REVERB_PATH: ""

  vue-production:
    build:
      context: .
      target: production
    image: my-front-production:latest
    container_name: my-front-production-container
    volumes:
      - ./dist:/usr/local/apache2/htdocs/
    ports:
      - 3000:80
