services:
  app:
    build: .
    image: micro365.cloud:latest
    container_name: micro365.cloud-container
    volumes:
      - ./:/var/www/html
      - node:/var/www/html/node_modules
      - laravel:/var/www/html/vendor
    command: sh /var/www/html/server.sh
    ports:
      - 8000:80      # Web application (Nginx/Apache on port 80)
      - 8090:8090    # Laravel Reverb
    depends_on:
      - mysql
    environment:
      # Application Settings
      APP_NAME: micro365
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://micro365.cloud
      APP_FRONTEND_URL: https://micro365.cloud
      APP_EMAIL_VERIFICATION_URL: "https://micro365.cloud/email/verify"
      APP_PASSWORD_RESET_URL: "https://micro365.cloud/password/reset"

      # Google OAuth (CRITICAL)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: "http://micro365.cloud/api/auth/google/callback"

      # Reverb Configuration
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: 8090
      REVERB_SCHEME: "http"
      REVERB_PATH: ""

      # Database Configuration
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
  mysql:
    image: mariadb:10.11.13
    container_name: mysql-micro365.cloud-container
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: UTC
    command: --sql-mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION"
    volumes:
      - mysql:/var/lib/mysql
    ports:
      - 3306:3306
  # phpmyadmin:
  #   image: phpmyadmin:5.2.2
  #   container_name: phpmyadmin-micro365.cloud-container
  #   depends_on:
  #     - mysql
  #   environment:
  #     UPLOAD_LIMIT: 50M
  #     PMA_HOST: mysql
  #     PMA_PORT: 3306
  #     PMA_ABSOLUTE_URI: "/phpmyadmin/"
  #   ports:
  #     - 9001:80
  adminer:
      image: adminer:5.4.2
      container_name: adminer-my-app-container
      depends_on:
        - mysql
      environment:
        ADMINER_DEFAULT_SERVER: mysql
        ADMINER_DESIGN: pepa-linha  # optional: you can choose different themes
        UPLOAD_LIMIT: 50M  # Adminer handles uploads differently
      ports:
        - 9002:8080  # Adminer uses port 8080 internally
volumes:
  mysql:
    name: micro365.cloud-mysql
  node:
    name: micro365.cloud-node
  laravel:
    name: micro365.cloud-laravel
