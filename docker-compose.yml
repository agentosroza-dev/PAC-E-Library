services:
  app:
    build: .
    image: agentosroza/my-laravel-app
    container_name: my-app-container
    volumes:
      - ./:/var/www/html
      - node:/var/www/html/node_modules
      - laravel:/var/www/html/vendor
    command: sh /var/www/html/start.sh
    ports:
      - 8000:80      # Web application (Nginx/Apache on port 80)
      - 8090:8090    # Laravel Reverb
    depends_on:
      - mysql
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_DATABASE: laravel
      APP_URL: http://localhost:8000
      APP_FRONTEND_URL: http://localhost:5173
      APP_EMAIL_VERIFICATION_URL: "http://localhost:5173/email/verify"
      APP_PASSWORD_RESET_URL: "http://localhost:5173/password/reset"

          # Google OAuth (CRITICAL)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: "http://localhost:8000/api/auth/google/callback"

      # Reverb Configuration
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: 8090
      REVERB_SCHEME: "http"
      REVERB_PATH: ""

  mysql:
    image: mariadb:10.11.13
    container_name: mysql-my-app-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    command: --sql-mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION"
    volumes:
      - mysql:/var/lib/mysql
    ports:
      - 3306:3306
  # phpmyadmin:
  #   image: phpmyadmin:5.2.3
  #   container_name: phpmyadmin-my-app-container
  #   depends_on:
  #     - mysql
  #   environment:
  #     UPLOAD_LIMIT: 50M
  #     PMA_HOST: mysql
  #     PMA_PORT: 3306
  #     PMA_USER: root
  #     PMA_PASSWORD: root
  #   ports:
  #     - 8001:80
  adminer:
      image: adminer:5.4.2
      container_name: adminer-my-app-container
      depends_on:
        - mysql
      environment:
        ADMINER_DEFAULT_SERVER: mysql
        ADMINER_DESIGN: pepa-linha  # optional: you can choose different themes
        UPLOAD_LIMIT: 50M  # Adminer handles uploads differently
      ports:
        - 8002:8080  # Adminer uses port 8080 internally
volumes:
  mysql:
    name: my-app-mysql
  node:
    name: my-app-node
  laravel:
    name: my-app-laravel
